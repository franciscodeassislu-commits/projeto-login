<!DOCTYPE html>
<html lang="pt-pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/media-query.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=person" />
</head>

<body>
    <main>
        <section id="login">
            <div id="imagem">

            </div>
            <div id="formulario">
                <h1>Login</h1>
                <p>seja bem-vindo(a)novamete.Fça login para acessar sua conta e poder fazer as configurações no seu
                    ambiente!</p>
                <form action="login.php" method="post" autocomplete="on"></form>
                <div>

                    <input type="email" name="email" id="email" placeholder="Digite seu e-mail" autocomplete="email"
                        required>
                    <label for="email">login:</label>
                </div>
                <div>
                    <input type="password" name="senha" id="senha" placeholder="Digite sua senha"
                        autocomplete="current-password">
                    <label for="senha">senha:</label>
                </div>
                <input type="submit" value="Entrar">
                <a href="esqueci a senha">Esqueci a senha</a>

            </div>

        </section>
    </main>
</body>

</html>
