<!DOCTYPE html>
<html lang="pt-pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/media-query.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>

<body>
    <main>
        <section id="login">
            <div id="imagem">

            </div>
            <div id="formulario">
                <h1>Login</h1>
                <p>seja bem-vindo(a) novamete.Faça login para acessar sua conta e poder fazer as configurações no seu
                    ambiente!</p>
                <form action="login.php" method="post" autocomplete="on"></form>
                <div class="campo">
                    <i class="fas fa-user"></i>
                    <input type="email" name="email" id="email" placeholder="Digite seu e-mail" autocomplete="email"
                        required>
                   
                </div>
                <div class="campo">
                    <i class="fas fa-key"></i>
                    <input type="password" name="senha" id="senha" placeholder="Digite sua senha"
                        autocomplete="current-password">
                    

                </div>
                <input type="submit" value="Entrar">
                <a href="esqueci-senha.html" class="botao">Esqueci minha senha <i class="material-icons"></i></a>


            </div>
            

        </section>
    </main>
   
</body>

</html>
